<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visaura - Dashboard Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        brand: {
                            sapphire: '#0a192f',
                            midnight: '#020617',
                            gold: '#d4af37',
                            goldLight: '#f3e5ab',
                            goldDark: '#aa8c2c',
                            silver: '#e2e8f0',
                        }
                    },
                    backgroundImage: {
                        'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
                        'sapphire-gradient': 'linear-gradient(135deg, #0a192f 0%, #020617 100%)',
                        'gold-gradient': 'linear-gradient(to right, #aa8c2c, #d4af37, #f3e5ab, #d4af37, #aa8c2c)',
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'shimmer': 'shimmer 3s linear infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'particles': 'particleDrift 20s linear infinite',
                    },
                    keyframes: {
                        shimmer: {
                            '0%': { backgroundPosition: '-200% 0' },
                            '100%': { backgroundPosition: '200% 0' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        particleDrift: {
                            '0%': { transform: 'translateY(0) translateX(0)' },
                            '100%': { transform: 'translateY(-100vh) translateX(50vw)' },
                        }
                    }
                }
            }
        };
    </script>
    <style>
        body {
            background-color: #020617; /* Midnight */
            color: #e2e8f0; /* Silver */
            overflow: hidden;
        }

        /* Ambient Background Effects */
        .ambient-glow {
            position: absolute;
            width: 80vw;
            height: 80vh;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, rgba(10, 25, 47, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
        }

        /* Abstract Particles (CSS purely) */
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(212, 175, 55, 0.4);
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(212, 175, 55, 0.8);
            pointer-events: none;
            z-index: 1;
        }

        /* Glassmorphism Panel */
        .glass-panel {
            background: rgba(10, 25, 47, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.7), 0 0 20px rgba(212, 175, 55, 0.05) inset;
        }

        /* Input fields with integrated icons */
        .premium-input-container {
            position: relative;
            transition: all 0.3s ease;
        }
        
        .premium-input-container:focus-within {
            box-shadow: 0 0 0 1px rgba(212, 175, 55, 0.5);
            border-radius: 0.75rem;
        }

        .premium-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }

        .premium-input:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(212, 175, 55, 0.5);
            outline: none;
        }

        /* Gold Gradient Text */
        .text-gold-gradient {
            background: linear-gradient(to right, #f3e5ab, #d4af37, #aa8c2c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Animated Primary Button */
        .btn-gold-pulse {
            background: linear-gradient(135deg, #0a192f 0%, #aa8c2c 100%);
            position: relative;
            overflow: hidden;
            z-index: 1;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .btn-gold-pulse::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #0a192f 0%, #d4af37 100%);
            opacity: 0;
            z-index: -1;
            transition: opacity 0.3s ease;
        }

        .btn-gold-pulse:hover::before {
            opacity: 1;
        }
        
        .btn-gold-pulse:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(212, 175, 55, 0.4);
        }

        .btn-gold-pulse::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(30deg);
            animation: shimmer 4s infinite;
            z-index: -1;
            pointer-events: none;
        }

        /* Machined Metal Button (OAuth) */
        .btn-metal {
            background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1), 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
        }
        
        .btn-metal:hover {
            background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.05) 100%);
            border-color: rgba(212, 175, 55, 0.3);
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="flex min-h-screen bg-sapphire-gradient font-sans relative">

    <!-- Background Elements -->
    <div class="ambient-glow"></div>
    
    <!-- CSS Particles Generator via Script -->
    <div id="particle-container" class="absolute inset-0 overflow-hidden pointer-events-none z-0"></div>

    <div class="flex w-full h-screen z-10 relative">
        
        <!-- Left Panel: Aesthetic Showcase -->
        <div class="hidden lg:flex w-1/2 flex-col justify-center items-center p-16 relative overflow-hidden">
            
            <!-- Abstract 3D Illustration Container -->
            <div class="relative w-full max-w-lg aspect-square flex flex-col items-center justify-center animate-float">
                
                <!-- Central Logo Element -->
                <div class="relative mb-12 flex flex-col items-center justify-center">
                    <!-- Glowing Aura -->
                    <div class="absolute w-40 h-40 bg-brand-gold rounded-full filter blur-[60px] opacity-20 animate-pulse-slow"></div>
                    
                    <!-- Stylized V with Lock -->
                    <div class="relative z-10 w-24 h-24 flex items-center justify-center bg-gradient-to-br from-brand-sapphire to-brand-midnight border border-brand-gold/30 rounded-2xl shadow-[0_0_30px_rgba(212,175,55,0.2)]">
                        <svg class="w-12 h-12 text-brand-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                        </svg>
                        <!-- Geometric V overlay -->
                        <div class="absolute inset-0 flex items-center justify-center opacity-30 pointer-events-none">
                            <svg class="w-20 h-20 text-brand-goldLight" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="0.5" d="M5 5l7 14 7-14" />
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- Decorative elements simulating the "Passport Stack & Global Map" prompt conceptually -->
                <div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-40">
                    <!-- Concentric map rings/routes -->
                    <div class="w-full h-full rounded-full border-[0.5px] border-brand-gold/20 absolute rotate-45 transform scale-75"></div>
                    <div class="w-full h-full rounded-full border-[0.5px] border-brand-gold/10 absolute -rotate-12 transform scale-90"></div>
                    
                    <!-- Faux Document Stack (CSS Representation) -->
                    <div class="absolute bottom-10 w-48 h-12 bg-gradient-to-r from-brand-silver/10 to-brand-silver/5 rounded-lg border border-brand-gold/20 transform -skew-y-6 translate-y-4 translate-x-4 shadow-xl"></div>
                    <div class="absolute bottom-12 w-48 h-12 bg-gradient-to-r from-brand-sapphire to-brand-midnight rounded-lg border border-brand-gold/40 transform -skew-y-6 shadow-2xl"></div>
                </div>

                <!-- Typography -->
                <div class="relative z-20 text-center mt-8">
                    <h1 class="text-4xl font-serif text-white tracking-wide mb-3">Welcome to Visaura</h1>
                    <p class="text-brand-goldLight/80 text-lg font-light tracking-wider uppercase">Your secure gateway to global mobility.</p>
                </div>
            </div>
        </div>

        <!-- Right Panel: Integrated Sign-In Form -->
        <div class="w-full lg:w-1/2 flex items-center justify-center p-6 sm:p-12 relative z-20">
            
            <!-- Frosted Glass Form Card -->
            <div class="w-full max-w-md glass-panel rounded-3xl p-8 sm:p-10 relative overflow-hidden">
                <!-- Subtle gold shimmer edge effect via pseudo element -->
                <div class="absolute inset-0 pointer-events-none border-2 border-transparent rounded-3xl" style="background: linear-gradient(135deg, rgba(212,175,55,0.4) 0%, transparent 50%, rgba(212,175,55,0.1) 100%) border-box; -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0); -webkit-mask-composite: destination-out; mask-composite: exclude;"></div>

                <!-- Brand Header -->
                <div class="text-center mb-8">
                    <h2 class="font-serif italic text-2xl text-gold-gradient mb-6">Visaura</h2>
                    <h3 class="text-3xl font-bold text-white mb-2 tracking-tight">Sign in to continue</h3>
                    <p class="text-brand-silver/60 text-sm font-medium">Access your visa application dashboard.</p>
                </div>

                <!-- Toggle Buttons -->
                <div class="flex gap-4 mb-8">
                    <button class="flex-1 py-3 rounded-xl bg-brand-sapphire border border-brand-gold text-brand-goldLight font-semibold shadow-[0_0_15px_rgba(212,175,55,0.15)] transition-all">
                        Sign In
                    </button>
                    <button class="flex-1 py-3 rounded-xl bg-white/5 border border-white/10 text-white/70 font-semibold hover:bg-white/10 hover:text-brand-goldLight transition-all">
                        Sign Up
                    </button>
                </div>

                <!-- OAuth Buttons -->
                <div class="space-y-4 mb-8">
                    <button class="w-full btn-metal py-3.5 rounded-xl flex items-center justify-center gap-3 text-white font-medium text-sm">
                        <!-- Custom integrated gold-tinted Google Logo SVG -->
                        <svg class="w-5 h-5 opacity-90" viewBox="0 0 24 24" fill="none">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#f3e5ab"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#d4af37"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#aa8c2c"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#f3e5ab"/>
                        </svg>
                        Continue with Google
                    </button>
                    <button class="w-full btn-metal py-3.5 rounded-xl flex items-center justify-center gap-3 text-white font-medium text-sm">
                        <!-- Custom integrated gold-tinted GitHub Logo SVG -->
                        <svg class="w-5 h-5 text-brand-goldLight opacity-90" fill="currentColor" viewBox="0 0 24 24">
                            <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd" />
                        </svg>
                        Continue with GitHub
                    </button>
                </div>

                <!-- Divider -->
                <div class="flex items-center mb-8">
                    <div class="flex-grow h-px bg-gradient-to-r from-transparent via-brand-gold/30 to-transparent"></div>
                    <span class="px-4 text-xs font-medium text-brand-silver/40 uppercase tracking-widest">Or</span>
                    <div class="flex-grow h-px bg-gradient-to-r from-transparent via-brand-gold/30 to-transparent"></div>
                </div>

                <!-- Form Fields -->
                <form class="space-y-5" onsubmit="event.preventDefault(); window.location.href='app.html';">
                    <!-- Email Field -->
                    <div class="premium-input-container">
                        <label class="sr-only" for="email">Email address</label>
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-brand-silver/50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                        </div>
                        <input id="email" type="email" required class="premium-input w-full pl-11 pr-4 py-3.5 rounded-xl text-sm placeholder-brand-silver/30" placeholder="you@example.com">
                    </div>

                    <!-- Password Field -->
                    <div class="premium-input-container">
                        <label class="sr-only" for="password">Password</label>
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-brand-silver/50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                        <input id="password" type="password" required class="premium-input w-full pl-11 pr-4 py-3.5 rounded-xl text-sm tracking-widest placeholder-brand-silver/30" placeholder="••••••••">
                    </div>

                    <!-- Forgot Password Link -->
                    <div class="flex justify-end pt-1">
                        <a href="#" class="text-xs font-medium text-brand-silver/60 hover:text-brand-goldLight transition-colors">Forgot Password?</a>
                    </div>

                    <!-- Main Submit Button -->
                    <button type="submit" class="btn-gold-pulse w-full py-4 mt-2 rounded-xl text-white font-bold tracking-wide text-sm flex justify-center items-center gap-2">
                        Sign In
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
                        </svg>
                    </button>
                </form>
            </div>
            
        </div>
    </div>

    <!-- Script for abstract particles -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('particle-container');
            const particleCount = 40;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle', 'animate-particles');
                
                // Randomize properties
                const size = Math.random() * 3 + 1; // 1px to 4px
                const startX = Math.random() * 100; // 0vw to 100vw
                const startY = Math.random() * 100 + 100; // Start below screen
                const duration = Math.random() * 20 + 10; // 10s to 30s
                const delay = Math.random() * -30; // Random start time

                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${startX}vw`;
                particle.style.top = `${startY}vh`;
                particle.style.animationDuration = `${duration}s`;
                particle.style.animationDelay = `${delay}s`;
                
                container.appendChild(particle);
            }
        });
    </script>
</body>
</html>
