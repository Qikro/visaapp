<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Visaura</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        brand: {
                            sapphire: '#0a192f',
                            midnight: '#020617',
                            gold: '#d4af37',
                            goldLight: '#f3e5ab',
                            goldDark: '#aa8c2c',
                            silver: '#e2e8f0',
                        }
                    }
                }
            }
        };
    </script>
    <style>
        body {
            background-color: #020617; /* Dark blue background */
            background-image: radial-gradient(circle at 50% 50%, #0a192f 0%, #020617 100%);
            color: #e2e8f0;
        }
        
        .glass-panel {
            background: rgba(10, 25, 47, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.7), inset 0 0 20px rgba(212, 175, 55, 0.05);
        }
        
        .premium-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }
        
        .premium-input:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(212, 175, 55, 0.5); /* Gold focus glow */
            outline: none;
            box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.3);
        }
        
        .btn-gold-pulse {
            background: linear-gradient(135deg, #0a192f 0%, #aa8c2c 100%);
            position: relative;
            overflow: hidden;
            z-index: 1;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .btn-gold-pulse::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; 
            background: linear-gradient(135deg, #0a192f 0%, #d4af37 100%); 
            opacity: 0; z-index: -1; transition: opacity 0.3s ease;
        }
        
        .btn-gold-pulse:hover::before { opacity: 1; }
        .btn-gold-pulse:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(212, 175, 55, 0.4);
        }
        
        .btn-metal {
            background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1), 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
        }
        
        .btn-metal:hover {
            background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.05) 100%);
            border-color: rgba(212, 175, 55, 0.3);
            transform: translateY(-1px);
        }
        
        .text-gold-gradient {
            background: linear-gradient(to right, #f3e5ab, #d4af37, #aa8c2c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-8 relative overflow-y-auto font-sans">
    
    <!-- Decorative background elements -->
    <div class="absolute inset-0 pointer-events-none overflow-hidden z-0">
        <div class="absolute top-[10%] left-[10%] w-[30%] h-[30%] bg-brand-gold/5 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[10%] right-[10%] w-[40%] h-[40%] bg-brand-sapphire/40 rounded-full blur-[100px]"></div>
    </div>

    <!-- Centered Modal Card -->
    <div class="w-full max-w-5xl flex flex-col lg:flex-row rounded-3xl overflow-hidden relative z-10 shadow-2xl bg-brand-midnight/40 border border-white/5">
        
        <!-- Left Panel: Branding / Showcase -->
        <div class="hidden lg:flex w-1/2 flex-col justify-center items-center p-12 relative overflow-hidden">
            <div class="text-center z-10 relative">
                <!-- Golden icon/logo placeholder -->
                <div class="w-20 h-20 mx-auto mb-8 rounded-full border border-brand-gold/40 flex items-center justify-center bg-gradient-to-br from-brand-sapphire to-brand-midnight shadow-[0_0_30px_rgba(212,175,55,0.2)]">
                    <svg class="w-10 h-10 text-brand-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                </div>
                <h1 class="text-4xl font-serif text-white tracking-wide mb-4 drop-shadow-md">Welcome to Visaura</h1>
                <p class="text-brand-goldLight/80 text-lg font-light tracking-wider uppercase drop-shadow-sm">Your secure gateway to global mobility.</p>
            </div>
            
            <!-- Decorative concentric circles -->
            <div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-20">
                <div class="w-[120%] aspect-square rounded-full border border-brand-gold/20 absolute"></div>
                <div class="w-[90%] aspect-square rounded-full border border-brand-gold/10 absolute"></div>
            </div>
        </div>

        <!-- Right Panel: Form Container (Glassmorphism applied here) -->
        <div class="w-full lg:w-1/2 p-8 sm:p-12 flex flex-col justify-center relative glass-panel rounded-3xl lg:rounded-none lg:rounded-r-3xl">
            <div class="text-center mb-8">
                <h2 class="font-serif italic text-2xl text-gold-gradient mb-2">Visaura</h2>
                <h3 class="text-2xl font-bold text-white mb-2 tracking-tight">Create your account</h3>
                <p class="text-brand-silver/60 text-sm font-medium">Join 5,000+ professionals worldwide</p>
            </div>

            <div class="space-y-4 mb-8">
                <button class="w-full btn-metal py-3.5 rounded-xl flex items-center justify-center gap-3 text-white font-medium text-sm transition-all hover:bg-white/5">
                    <svg class="w-5 h-5 opacity-90" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#f3e5ab"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#d4af37"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#aa8c2c"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#f3e5ab"/></svg>
                    Continue with Google
                </button>
                <button class="w-full btn-metal py-3.5 rounded-xl flex items-center justify-center gap-3 text-white font-medium text-sm transition-all hover:bg-white/5">
                    <svg class="w-5 h-5 text-brand-goldLight opacity-90" fill="currentColor" viewBox="0 0 24 24"><path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd" /></svg>
                    Continue with GitHub
                </button>
            </div>

            <div class="flex items-center mb-8">
                <div class="flex-grow h-px bg-gradient-to-r from-transparent via-brand-gold/30 to-transparent"></div>
                <span class="px-4 text-xs font-medium text-brand-silver/40 uppercase tracking-widest">Or</span>
                <div class="flex-grow h-px bg-gradient-to-r from-brand-gold/30 via-transparent to-transparent"></div>
            </div>

            <form id="visauraForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-brand-silver/80 mb-1.5" for="fullName">Full Name</label>
                    <input id="fullName" type="text" class="premium-input w-full px-4 py-3.5 rounded-xl text-sm placeholder-brand-silver/40" placeholder="Jane Doe" required>
                </div>

                <div>
                    <label class="block text-sm font-medium text-brand-silver/80 mb-1.5" for="email">Work Email</label>
                    <input id="email" type="email" class="premium-input w-full px-4 py-3.5 rounded-xl text-sm placeholder-brand-silver/40" placeholder="jane@company.com" required>
                </div>

                <div>
                    <label class="block text-sm font-medium text-brand-silver/80 mb-1.5" for="password">Secure Password</label>
                    <input id="password" type="password" class="premium-input w-full px-4 py-3.5 rounded-xl text-sm tracking-widest placeholder-brand-silver/40" placeholder="••••••••" required>
                </div>
                
                <div class="flex items-start gap-3 pt-2">
                    <input id="terms" type="checkbox" class="w-4 h-4 mt-0.5 rounded border border-brand-silver/30 bg-transparent text-brand-goldLight focus:ring-brand-goldLight focus:ring-1 focus:outline-none appearance-none checked:bg-brand-goldLight checked:border-transparent flex items-center justify-center after:content-[''] after:hidden checked:after:block after:w-1.5 after:h-2.5 after:border-r-2 after:border-b-2 after:border-[#020617] after:rotate-45 after:-translate-y-0.5 cursor-pointer" required>
                    <label for="terms" class="text-xs text-brand-silver/60 leading-relaxed">
                        I agree to the <a href="terms.html" class="text-brand-goldLight hover:underline font-medium">Terms & Conditions</a> and <a href="privacy.html" class="text-brand-goldLight hover:underline font-medium">Privacy Policy</a>
                    </label>
                </div>

                <button type="submit" class="btn-gold-pulse w-full py-4 mt-4 rounded-xl text-white font-bold tracking-wide text-sm flex justify-center items-center gap-2">
                    <span>Complete Sign Up</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
                </button>

                <p class="text-center text-sm text-brand-silver/60 mt-4">
                    Already have an account? 
                    <a href="index.html" class="text-brand-goldLight font-medium hover:underline">Sign In</a>
                </p>
            </form>
        </div>
    </div>
</body>

            </form>
        </div>
    </div>
</body>
</html>
